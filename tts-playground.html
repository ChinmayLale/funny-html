<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TTS Playground</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b5876);
      color: white;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: #111;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 {
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }
    select, input {
      width: 100%;
      margin-bottom: 15px;
    }
    label {
      font-size: 14px;
      margin-top: 10px;
      display: block;
    }
    button {
      width: 48%;
      padding: 12px;
      margin: 1%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .speak { background: #4CAF50; color: white; }
    .stop { background: #f44336; color: white; }
  </style>
</head>
<body>

<div class="container">
  <h1>🔊 TTS Playground</h1>

  <textarea id="text" placeholder="Type something to speak..."></textarea>

  <label>Voice</label>
  <select id="voiceSelect"></select>

  <label>Pitch: <span id="pitchVal">1</span></label>
  <input type="range" id="pitch" min="0" max="2" step="0.1" value="1">

  <label>Rate: <span id="rateVal">1</span></label>
  <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

  <label>Volume: <span id="volumeVal">1</span></label>
  <input type="range" id="volume" min="0" max="1" step="0.1" value="1">

  <div>
    <button class="speak" onclick="speak()">▶ Speak</button>
    <button class="stop" onclick="stopSpeech()">⏹ Stop</button>
  </div>
</div>

<script>
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const voiceSelect = document.getElementById('voiceSelect');
  voiceSelect.innerHTML = '';

  voices.forEach((voice, i) => {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = `${voice.name} (${voice.lang})`;
    voiceSelect.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {
  const text = document.getElementById('text').value;
  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);

  const selectedVoice = voices[document.getElementById('voiceSelect').value];
  utterance.voice = selectedVoice;

  utterance.pitch = document.getElementById('pitch').value;
  utterance.rate = document.getElementById('rate').value;
  utterance.volume = document.getElementById('volume').value;

  speechSynthesis.cancel(); // stop previous
  speechSynthesis.speak(utterance);
}

function stopSpeech() {
  speechSynthesis.cancel();
}

// UI updates
document.getElementById('pitch').oninput = e => {
  document.getElementById('pitchVal').innerText = e.target.value;
};
document.getElementById('rate').oninput = e => {
  document.getElementById('rateVal').innerText = e.target.value;
};
document.getElementById('volume').oninput = e => {
  document.getElementById('volumeVal').innerText = e.target.value;
};
</script>

</body>
</html>
