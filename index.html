<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FetchBot — Groq Function Calling × dummyjson.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0b0d11;
        --bg-grid: rgba(255, 255, 255, 0.025);
        --surface: #141821;
        --surface-2: #1b202b;
        --border: #262c38;
        --border-soft: #1e2430;
        --text: #e9ebf1;
        --text-dim: #9aa1b1;
        --text-faint: #5b6273;
        --mint: #4fd1c5;
        --mint-soft: rgba(79, 209, 197, 0.13);
        --mint-border: rgba(79, 209, 197, 0.3);
        --amber: #f2b84b;
        --amber-soft: rgba(242, 184, 75, 0.14);
        --rose: #f17171;
        --rose-soft: rgba(241, 113, 113, 0.14);
        --violet: #a594f9;
        --radius-lg: 18px;
        --radius-md: 13px;
        --radius-sm: 9px;
        --font-display: "Space Grotesk", sans-serif;
        --font-body: "Inter", sans-serif;
        --font-mono: "IBM Plex Mono", monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: var(--bg);
        background-image: radial-gradient(
          circle at 1px 1px,
          var(--bg-grid) 1px,
          transparent 1px
        );
        background-size: 26px 26px;
        color: var(--text);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }
      #app {
        max-width: 880px;
        margin: 0 auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      a {
        color: var(--mint);
      }
      button {
        font-family: var(--font-body);
        cursor: pointer;
      }
      button:focus-visible,
      input:focus-visible,
      a:focus-visible {
        outline: 2px solid var(--mint);
        outline-offset: 2px;
      }

      /* ---------- Header ---------- */
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          rgba(79, 209, 197, 0.05),
          transparent
        );
        flex-shrink: 0;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 18px;
        color: var(--text);
      }
      .brand .bolt {
        color: var(--mint);
      }
      .brand-sub {
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-faint);
        margin-left: 2px;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--rose);
        flex-shrink: 0;
        transition: background 0.2s;
        box-shadow: 0 0 0 3px rgba(241, 113, 113, 0.15);
      }
      .status-dot.connected {
        background: var(--mint);
        box-shadow: 0 0 0 3px var(--mint-soft);
      }
      .icon-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-dim);
        width: 34px;
        height: 34px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        flex-shrink: 0;
        transition: border-color 0.15s, color 0.15s;
      }
      .icon-btn:hover {
        border-color: var(--mint-border);
        color: var(--mint);
      }

      /* ---------- Settings panel ---------- */
      .settings-panel {
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        padding: 16px 18px;
        display: grid;
        gap: 10px;
        flex-shrink: 0;
      }
      .settings-panel.hidden {
        display: none;
      }
      .settings-panel label {
        font-size: 12px;
        color: var(--text-dim);
        font-family: var(--font-mono);
      }
      .key-row {
        display: flex;
        gap: 8px;
      }
      .key-row input {
        flex: 1;
      }
      .settings-panel input,
      .settings-panel select {
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 9px 11px;
        border-radius: var(--radius-sm);
        font-size: 13.5px;
        font-family: var(--font-mono);
      }
      .settings-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .btn-primary {
        background: var(--mint);
        color: #062420;
        border: none;
        font-weight: 600;
        padding: 9px 16px;
        border-radius: var(--radius-sm);
        font-size: 13.5px;
      }
      .btn-primary:hover {
        filter: brightness(1.08);
      }
      .hint {
        font-size: 12px;
        color: var(--text-faint);
      }
      .toggle-eye {
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        width: 38px;
        border-radius: var(--radius-sm);
        font-size: 13px;
      }

      /* ---------- Chat log ---------- */
      .chat-log {
        flex: 1;
        overflow-y: auto;
        padding: 20px 18px 10px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .chat-log::-webkit-scrollbar {
        width: 8px;
      }
      .chat-log::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 8px;
      }

      .msg {
        display: flex;
      }
      .msg-user {
        justify-content: flex-end;
      }
      .msg-bot {
        justify-content: flex-start;
      }
      .bubble {
        max-width: 78%;
        padding: 10px 14px;
        border-radius: var(--radius-md);
        font-size: 14.5px;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .msg-user .bubble {
        background: var(--mint);
        color: #062420;
        font-weight: 500;
        border-bottom-right-radius: 4px;
      }
      .msg-bot .bubble {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-bottom-left-radius: 4px;
      }
      .bubble-error {
        border-color: var(--rose) !important;
        color: var(--rose);
        background: var(--rose-soft) !important;
      }
      .bubble-thinking {
        display: flex;
        align-items: center;
        padding: 13px 16px;
      }

      .loader-dots {
        display: inline-flex;
        gap: 4px;
      }
      .loader-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--mint);
        animation: pulse 1.1s infinite ease-in-out;
      }
      .loader-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .loader-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes pulse {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.35;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* ---------- Tool trace + result blocks ---------- */
      .tool-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
        width: 100%;
      }
      .tool-trace {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--mint);
        background: var(--mint-soft);
        border: 1px solid var(--mint-border);
        padding: 6px 12px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 100%;
        overflow-x: auto;
        white-space: nowrap;
      }
      .tool-block.error .tool-trace {
        color: var(--rose);
        background: var(--rose-soft);
        border-color: rgba(241, 113, 113, 0.35);
      }
      .empty-state {
        font-size: 13px;
        color: var(--text-faint);
        padding: 4px 4px 2px;
        font-style: italic;
      }
      .empty-state.error {
        color: var(--rose);
        font-style: normal;
      }

      .card-rail {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        width: 100%;
        padding: 2px 2px 10px;
        scroll-snap-type: x proximity;
      }
      .card-rail::-webkit-scrollbar {
        height: 6px;
      }
      .card-rail::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 8px;
      }

      .card {
        flex: 0 0 auto;
        width: 206px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        overflow: hidden;
        scroll-snap-align: start;
        display: flex;
        flex-direction: column;
        transition: border-color 0.15s, transform 0.15s;
      }
      .card:hover {
        border-color: var(--mint-border);
        transform: translateY(-2px);
      }
      .card-media {
        position: relative;
        width: 100%;
        height: 128px;
        background: var(--surface-2);
        flex-shrink: 0;
      }
      .card-media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .card-body {
        padding: 10px 12px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .card-title {
        font-weight: 600;
        font-size: 13.5px;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-sub {
        font-size: 12px;
        color: var(--text-dim);
      }
      .card-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .card-row.sub {
        font-size: 11.5px;
        color: var(--text-faint);
      }
      .card-row.meta-row {
        font-size: 11.5px;
        color: var(--text-dim);
        gap: 8px;
      }

      .badge {
        position: absolute;
        top: 8px;
        left: 8px;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 6px;
      }
      .badge-discount {
        background: var(--rose);
        color: #2a0a0a;
      }

      .price-row {
        font-family: var(--font-mono);
      }
      .price-now {
        font-weight: 600;
        color: var(--mint);
        font-size: 14px;
      }
      .price-was {
        color: var(--text-faint);
        text-decoration: line-through;
        font-size: 11.5px;
      }

      .pill {
        font-size: 10.5px;
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-dim);
      }
      .pill-rating {
        color: var(--amber);
        border-color: rgba(242, 184, 75, 0.3);
        background: var(--amber-soft);
      }
      .pill-tag {
        color: var(--violet);
      }
      .pill-diff-easy {
        color: var(--mint);
        border-color: var(--mint-border);
        background: var(--mint-soft);
      }
      .pill-diff-medium {
        color: var(--amber);
        border-color: rgba(242, 184, 75, 0.3);
        background: var(--amber-soft);
      }
      .pill-diff-hard {
        color: var(--rose);
        border-color: rgba(241, 113, 113, 0.3);
        background: var(--rose-soft);
      }

      .stock {
        font-size: 11px;
        color: var(--text-faint);
      }
      .stock.low {
        color: var(--rose);
      }

      .card-user {
        flex-direction: row;
        align-items: center;
        gap: 10px;
        padding: 12px;
        width: 240px;
      }
      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--border);
        flex-shrink: 0;
      }
      .card-user .card-body {
        padding: 0;
        gap: 3px;
      }

      .card-post {
        width: 230px;
        padding: 12px;
        gap: 6px;
        display: flex;
        flex-direction: column;
      }
      .card-excerpt {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-cart {
        width: 240px;
        padding: 12px;
        gap: 8px;
        display: flex;
        flex-direction: column;
      }
      .cart-items {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .cart-item {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--text-dim);
      }
      .cart-item.more {
        color: var(--text-faint);
        font-style: italic;
      }
      .cart-total-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-top: 1px solid var(--border-soft);
        padding-top: 7px;
        font-family: var(--font-mono);
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
      }

      .quote-block {
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--mint);
        border-radius: var(--radius-sm);
        padding: 12px 16px;
      }
      .quote-mark {
        font-family: var(--font-display);
        font-size: 26px;
        color: var(--mint);
        line-height: 0.6;
      }
      .quote-text {
        font-size: 14px;
        font-style: italic;
        color: var(--text);
        margin-top: 2px;
      }
      .quote-author {
        font-size: 12px;
        color: var(--text-faint);
        margin-top: 6px;
      }

      .todo-list {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 4px;
      }
      .todo-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border-soft);
        font-size: 13px;
      }
      .todo-row:last-child {
        border-bottom: none;
      }
      .todo-check {
        width: 18px;
        height: 18px;
        border-radius: 5px;
        border: 1.5px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: var(--mint);
        flex-shrink: 0;
      }
      .todo-row.done .todo-check {
        background: var(--mint-soft);
        border-color: var(--mint-border);
      }
      .todo-row.done .todo-text {
        color: var(--text-faint);
        text-decoration: line-through;
      }
      .todo-text {
        flex: 1;
      }
      .todo-user {
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--text-faint);
      }

      .comment-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
      }
      .comment-body {
        font-size: 13px;
        color: var(--text);
      }
      .comment-meta {
        font-size: 11.5px;
        color: var(--text-faint);
        margin-top: 5px;
        font-family: var(--font-mono);
      }

      /* ---------- Suggestions + composer ---------- */
      .suggestions {
        display: flex;
        gap: 8px;
        padding: 0 18px 10px;
        overflow-x: auto;
        flex-shrink: 0;
      }
      .suggestions.hidden {
        display: none;
      }
      .suggestion-chip {
        flex: 0 0 auto;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-dim);
        padding: 7px 13px;
        border-radius: 999px;
        font-size: 12.5px;
        white-space: nowrap;
        transition: border-color 0.15s, color 0.15s;
      }
      .suggestion-chip:hover {
        border-color: var(--mint-border);
        color: var(--mint);
      }

      .composer {
        display: flex;
        gap: 10px;
        padding: 14px 18px;
        border-top: 1px solid var(--border);
        background: var(--bg);
        flex-shrink: 0;
      }
      .composer input {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 12px 15px;
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: var(--font-body);
      }
      .composer input::placeholder {
        color: var(--text-faint);
      }
      .send-btn {
        background: var(--mint);
        color: #062420;
        border: none;
        font-weight: 600;
        padding: 0 20px;
        border-radius: var(--radius-md);
        font-size: 14px;
      }
      .send-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .send-btn:hover:not(:disabled) {
        filter: brightness(1.08);
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
      @media (max-width: 520px) {
        .card {
          width: 168px;
        }
        .card-user {
          width: 210px;
        }
        .card-post,
        .card-cart {
          width: 200px;
        }
        .brand-sub {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="topbar">
        <div class="brand">
          <span class="bolt">⚡</span><span>FetchBot</span>
        </div>
        <div class="brand-sub">Groq function calling × dummyjson.com</div>
        <span id="statusDot" class="status-dot" title="Not connected"></span>
        <button
          id="settingsBtn"
          class="icon-btn"
          title="Settings"
          aria-label="Settings"
        >
          ⚙
        </button>
      </div>

      <div id="settingsPanel" class="settings-panel hidden">
        <label for="apiKeyInput">Groq API key</label>
        <div class="key-row">
          <input
            id="apiKeyInput"
            type="password"
            placeholder="gsk_..."
            autocomplete="off"
          />
          <button
            id="toggleKeyBtn"
            class="toggle-eye"
            type="button"
            title="Show/hide"
          >
            👁
          </button>
        </div>
        <label for="modelSelect">Model</label>
        <select id="modelSelect">
          <option value="llama-3.3-70b-versatile">
            llama-3.3-70b-versatile — recommended
          </option>
          <option value="llama-3.1-8b-instant">
            llama-3.1-8b-instant — fastest
          </option>
        </select>
        <div class="settings-row">
          <button id="saveKeyBtn" class="btn-primary" type="button">
            Save & connect
          </button>
          <span class="hint"
            >Free key at
            <a
              href="https://console.groq.com/keys"
              target="_blank"
              rel="noopener"
              >console.groq.com/keys</a
            >
            · stays in this tab only, never stored or sent anywhere but
            Groq.</span
          >
        </div>
      </div>

      <main id="chatLog" class="chat-log" aria-live="polite"></main>

      <div id="suggestions" class="suggestions"></div>

      <form id="composer" class="composer">
        <input
          id="msgInput"
          type="text"
          placeholder="Ask for products, recipes, users, quotes, todos, carts…"
          autocomplete="off"
        />
        <button type="submit" id="sendBtn" class="send-btn">Send</button>
      </form>
    </div>

    <script>
      (function () {
        "use strict";

        const BASE = "https://dummyjson.com";
        const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";

        const chatLog = document.getElementById("chatLog");
        const settingsPanel = document.getElementById("settingsPanel");
        const settingsBtn = document.getElementById("settingsBtn");
        const apiKeyInput = document.getElementById("apiKeyInput");
        const toggleKeyBtn = document.getElementById("toggleKeyBtn");
        const modelSelect = document.getElementById("modelSelect");
        const saveKeyBtn = document.getElementById("saveKeyBtn");
        const statusDot = document.getElementById("statusDot");
        const suggestionsEl = document.getElementById("suggestions");
        const composer = document.getElementById("composer");
        const msgInput = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtn");

        let groqApiKey = "";
        let groqModel = modelSelect.value;
        let isBusy = false;

        const SYSTEM_PROMPT = `You are FetchBot, a friendly shopping & data assistant wired directly into the dummyjson.com test API through function calling. You have tools to fetch real products, recipes, users, blog posts, quotes, todos, shopping carts, and comments. ALWAYS call the most relevant tool when the user asks for any of this data - never invent product names, prices, recipes, people or any data yourself, and never answer this kind of request from memory alone.

Map everyday phrases to the right tool:
- "beauty/skincare/makeup/perfume/phone/furniture/etc products" -> get_products_by_category with the closest matching category slug
- a general product search that doesn't match a category -> search_products
- a cuisine, dish name, or "recipe for X" -> search_recipes
- "find user(s) named X" or "list users" -> search_users
- "articles/posts about X" -> search_posts
- "quote(s)" -> get_quotes
- "todos/tasks" -> get_todos
- "cart(s)" -> get_carts
- "comments/reviews" -> get_comments

After receiving tool results, write ONE short, warm sentence (max ~20 words) introducing what you found. Do NOT repeat the names, prices or full list of items in your text - that data is already shown to the user as cards directly above your message, so keep it brief and avoid being repetitive. If a tool returns zero results, say so briefly and suggest a different search term.`;

        let messages = [{ role: "system", content: SYSTEM_PROMPT }];

        const TOOLS = [
          {
            type: "function",
            function: {
              name: "search_products",
              description:
                "Search dummyjson.com products by free-text keyword (matches title, description or brand). Use for general product searches that don't match a specific category.",
              parameters: {
                type: "object",
                properties: {
                  query: {
                    type: "string",
                    description: "Search keyword, e.g. 'phone' or 'lipstick'",
                  },
                },
                required: ["query"],
              },
            },
          },
          {
            type: "function",

              description:

              parameters: {

                      "kitchen-accessories",

                      "motorcycle",
                      "skin-care",
                      "smartphones",
                      "sports-accessories",
                      "sunglasses",
                      "tablets",
                      "tops",
                      "vehicle",
                      "womens-bags",
                      "womens-dresses",
                      "womens-jewellery",
                      "womens-shoes",
                      "womens-watches",
                    ],
                  },
                },
                required: ["category"],
              },
            },
          },
          {
            type: "function",
            function: {
              name: "search_recipes",
              description:
                "Search or list cooking recipes from dummyjson.com, including ingredients, cook time, difficulty and cuisine.",
              parameters: {
                type: "object",
                properties: {
                  query: {
                    type: "string",
                    description:
                      "Optional keyword - a dish name or cuisine like 'Italian' or 'dessert'. Omit for a general list.",
                  },
                },
              },
            },
          },
          {
            type: "function",
            function: {
              name: "search_users",
              description:
                "Search or list sample user profiles from dummyjson.com.",
              parameters: {
                type: "object",
                properties: {
                  query: {
                    type: "string",
                    description:
                      "Optional keyword to search by name. Omit to list users.",
                  },
                },
              },
            },
          },
          {
            type: "function",
            function: {
              name: "search_posts",
              description:
                "Search or list sample blog/social posts from dummyjson.com.",
              parameters: {
                type: "object",
                properties: {
                  query: {
                    type: "string",
                    description: "Optional keyword. Omit to list recent posts.",
                  },
                },
              },
            },
          },
          {
            type: "function",
            function: {
              name: "get_quotes",
              description:
                "Get a batch of random inspirational quotes from dummyjson.com.",
              parameters: {
                type: "object",
                properties: {
                  limit: {
                    type: "number",
                    description: "How many quotes, default 5",
                  },
                },
              },
            },
          },
          {
            type: "function",
            function: {
              name: "get_todos",
              description: "Get sample to-do / task items from dummyjson.com.",
              parameters: {
                type: "object",
                properties: {
                  limit: {
                    type: "number",
                    description: "How many todos, default 8",
                  },
                },
              },
            },
          },
          {
            type: "function",
            function: {
              name: "get_carts",
              description:
                "Get sample shopping cart records from dummyjson.com, with items, quantities and totals.",
              parameters: {
                type: "object",
                properties: {
                  limit: {
                    type: "number",
                    description: "How many carts, default 4",
                  },
                },
              },
            },
          },
          {
            type: "function",
            function: {
              name: "get_comments",
              description: "Get sample user comments from dummyjson.com.",
              parameters: {
                type: "object",
                properties: {
                  limit: {
                    type: "number",
                    description: "How many comments, default 6",
                  },
                },
              },
            },
          },
        ];

        const SUGGESTIONS = [
          {
            label: "💄 Good beauty products",
            text: "Show me some good beauty products",
          },
          { label: "🍝 Italian recipes", text: "Find me some Italian recipes" },
          { label: "👤 Users named John", text: "Find users named John" },
          {
            label: "💬 Tech posts",
            text: "Show me some posts about technology",
          },
          {
            label: "✨ Inspirational quotes",
            text: "Give me a few inspirational quotes",
          },
          { label: "🛒 A sample cart", text: "Show me a shopping cart" },
          { label: "📝 Pending todos", text: "Show me some todos" },
        ];

        function esc(s) {
          return String(s ?? "").replace(
            /[&<>"']/g,
            (c) =>
              ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
              }[c])
          );
        }
        function scrollToBottom() {
          chatLog.scrollTop = chatLog.scrollHeight;
        }
        function enc(s) {
          return encodeURIComponent(s);
        }
        function clampLimit(n, def) {
          const v = Number(n);
          return Number.isFinite(v) && v > 0
            ? Math.min(Math.round(v), 12)
            : def;
        }

        /* ---------- Settings ---------- */
        settingsBtn.addEventListener("click", () =>
          settingsPanel.classList.toggle("hidden")
        );
        toggleKeyBtn.addEventListener("click", () => {
          apiKeyInput.type =
            apiKeyInput.type === "password" ? "text" : "password";
        });
        saveKeyBtn.addEventListener("click", () => {
          const key = apiKeyInput.value.trim();
          groqModel = modelSelect.value;
          if (!key) {
            apiKeyInput.focus();
            return;
          }
          groqApiKey = key;
          statusDot.classList.add("connected");
          statusDot.title = "Connected to Groq";
          settingsPanel.classList.add("hidden");
          msgInput.focus();
        });

        /* ---------- Suggestions ---------- */
        function renderSuggestions() {
          suggestionsEl.innerHTML = SUGGESTIONS.map(
            (s, i) =>
              `<button type="button" class="suggestion-chip" data-i="${i}">${esc(
                s.label
              )}</button>`
          ).join("");
          suggestionsEl.querySelectorAll(".suggestion-chip").forEach((btn) => {
            btn.addEventListener("click", () => {
              const s = SUGGESTIONS[Number(btn.dataset.i)];
              msgInput.value = s.text;
              composer.dispatchEvent(new Event("submit", { cancelable: true }));
            });
          });
        }
        renderSuggestions();

        /* ---------- Chat rendering ---------- */
        function appendUserBubble(text) {
          const el = document.createElement("div");
          el.className = "msg msg-user";
          el.innerHTML = `<div class="bubble">${esc(text)}</div>`;
          chatLog.appendChild(el);
          scrollToBottom();
        }
        function appendBotBubble(text) {
          const el = document.createElement("div");
          el.className = "msg msg-bot";
          el.innerHTML = `<div class="bubble">${esc(text)}</div>`;
          chatLog.appendChild(el);
          scrollToBottom();
        }
        function appendErrorBubble(text) {
          const el = document.createElement("div");
          el.className = "msg msg-bot";
          el.innerHTML = `<div class="bubble bubble-error">⚠ ${esc(
            text
          )}</div>`;
          chatLog.appendChild(el);
          scrollToBottom();
        }
        function appendThinking() {
          const el = document.createElement("div");
          el.className = "msg msg-bot";
          el.innerHTML = `<div class="bubble bubble-thinking"><span class="loader-dots"><span></span><span></span><span></span></span></div>`;
          chatLog.appendChild(el);
          scrollToBottom();
          return el;
        }

        function formatToolLabel(name, args) {
          const argStr = Object.entries(args || {})
            .map(([k, v]) => `${k}: ${JSON.stringify(v)}`)
            .join(", ");
          return `→ ${name}(${argStr})`;
        }
        function appendToolTrace(name, args) {
          const label = formatToolLabel(name, args);
          const wrap = document.createElement("div");
          wrap.className = "tool-block loading";
          wrap.dataset.label = label;
          wrap.innerHTML = `<div class="tool-trace">${esc(
            label
          )} <span class="loader-dots"><span></span><span></span><span></span></span></div>`;
          chatLog.appendChild(wrap);
          scrollToBottom();
          return wrap;
        }

        /* ---------- Card templates ---------- */
        function productCard(p) {
          const hasDiscount = p.discountPercentage && p.discountPercentage >= 1;
          const discounted = hasDiscount
            ? (p.price * (1 - p.discountPercentage / 100)).toFixed(2)
            : null;
          return `<div class="card card-product">
      <div class="card-media">
        <img src="${esc(p.thumbnail || "")}" alt="${esc(
            p.title
          )}" loading="lazy" onerror="this.style.display='none'"/>
        ${
          hasDiscount
            ? `<span class="badge badge-discount">-${Math.round(
                p.discountPercentage
              )}%</span>`
            : ""
        }
      </div>
      <div class="card-body">
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-sub">${esc(p.brand || p.category || "")}</div>
        <div class="card-row price-row">
          <span class="price-now">$${discounted || p.price}</span>
          ${hasDiscount ? `<span class="price-was">$${p.price}</span>` : ""}
        </div>
        <div class="card-row meta-row">
          <span class="pill pill-rating">★ ${p.rating ?? "–"}</span>
          <span class="stock ${(p.stock ?? 0) < 10 ? "low" : ""}">${
            (p.stock ?? 0) > 0 ? p.stock + " in stock" : "Out of stock"
          }</span>
        </div>
      </div>
    </div>`;
        }
        function recipeCard(r) {
          const totalTime = (r.prepTimeMinutes || 0) + (r.cookTimeMinutes || 0);
          const diffClass = (r.difficulty || "").toLowerCase();
          return `<div class="card card-recipe">
      <div class="card-media"><img src="${esc(r.image || "")}" alt="${esc(
            r.name
          )}" loading="lazy" onerror="this.style.display='none'"/></div>
      <div class="card-body">
        <div class="card-title">${esc(r.name)}</div>
        <div class="card-row meta-row">
          <span class="pill">${esc(r.cuisine || "—")}</span>
          <span class="pill pill-diff-${esc(diffClass)}">${esc(
            r.difficulty || "—"
          )}</span>
        </div>
        <div class="card-row sub">⏱ ${totalTime || "–"} min · 🍽 ${
            r.servings ?? "–"
          } servings · ★ ${r.rating ?? "–"}</div>
      </div>
    </div>`;
        }
        function userCard(u) {
          const company = (u.company && u.company.title) || "";
          const city = (u.address && u.address.city) || "";
          return `<div class="card card-user">
      <img class="avatar" src="${esc(u.image || "")}" alt="${esc(
            u.firstName || ""
          )}" onerror="this.style.visibility='hidden'"/>
      <div class="card-body">
        <div class="card-title">${esc(u.firstName)} ${esc(u.lastName)}</div>
        <div class="card-sub">@${esc(u.username)}</div>
        <div class="card-row sub">✉ ${esc(u.email)}</div>
        <div class="card-row sub">${esc(company)}${
            company && city ? " · " : ""
          }${esc(city)}</div>
      </div>
    </div>`;
        }
        function postCard(p) {
          const likes = (p.reactions && p.reactions.likes) || 0;
          const dislikes = (p.reactions && p.reactions.dislikes) || 0;
          const body = p.body || "";
          return `<div class="card card-post">
      <div class="card-title">${esc(p.title)}</div>
      <div class="card-excerpt">${esc(body.slice(0, 140))}${
            body.length > 140 ? "…" : ""
          }</div>
      <div class="card-row meta-row">${(p.tags || [])
        .slice(0, 3)
        .map((t) => `<span class="pill pill-tag">#${esc(t)}</span>`)
        .join("")}</div>
      <div class="card-row sub">👍 ${likes} · 👎 ${dislikes} · 👁 ${
            p.views ?? 0
          }</div>
    </div>`;
        }
        function quoteBlock(q) {
          return `<div class="quote-block">
      <div class="quote-mark">“</div>
      <div class="quote-text">${esc(q.quote)}</div>
      <div class="quote-author">— ${esc(q.author)}</div>
    </div>`;
        }
        function todoRow(t) {
          return `<div class="todo-row ${t.completed ? "done" : ""}">
      <span class="todo-check">${t.completed ? "✓" : ""}</span>
      <span class="todo-text">${esc(t.todo)}</span>
      <span class="todo-user">user #${esc(t.userId)}</span>
    </div>`;
        }
        function cartCard(c) {
          const products = c.products || [];
          const items = products
            .slice(0, 4)
            .map(
              (p) =>
                `<div class="cart-item"><span>${esc(p.title)} ×${
                  p.quantity
                }</span><span>$${
                  p.discountedTotal ?? p.discountedPrice ?? p.total
                }</span></div>`
            )
            .join("");
          const more =
            products.length > 4
              ? `<div class="cart-item more">+${
                  products.length - 4
                } more item(s)</div>`
              : "";
          return `<div class="card card-cart">
      <div class="card-title">Cart #${esc(c.id)} · ${esc(
            c.totalProducts
          )} items</div>
      <div class="cart-items">${items}${more}</div>
      <div class="cart-total-row"><span class="card-sub">Total</span><span class="price-now">$${
        c.discountedTotal
      }</span><span class="price-was">$${c.total}</span></div>
    </div>`;
        }
        function commentRow(c) {
          const username = (c.user && c.user.username) || "anon";
          return `<div class="comment-row">
      <div class="comment-body">${esc(c.body)}</div>
      <div class="comment-meta">— @${esc(username)} · 👍 ${c.likes ?? 0}</div>
    </div>`;
        }

        function buildResultBlock(kind, items, label) {
          if (!items || items.length === 0) {
            return `<div class="tool-trace">${esc(
              label
            )}</div><div class="empty-state">No results found — try a different search term.</div>`;
          }
          let inner;
          switch (kind) {
            case "products":
              inner = `<div class="card-rail">${items
                .map(productCard)
                .join("")}</div>`;
              break;
            case "recipes":
              inner = `<div class="card-rail">${items
                .map(recipeCard)
                .join("")}</div>`;
              break;
            case "users":
              inner = `<div class="card-rail">${items
                .map(userCard)
                .join("")}</div>`;
              break;
            case "posts":
              inner = `<div class="card-rail">${items
                .map(postCard)
                .join("")}</div>`;
              break;
            case "quotes":
              inner = `<div class="stack">${items
                .map(quoteBlock)
                .join("")}</div>`;
              break;
            case "todos":
              inner = `<div class="stack todo-list">${items
                .map(todoRow)
                .join("")}</div>`;
              break;
            case "carts":
              inner = `<div class="card-rail">${items
                .map(cartCard)
                .join("")}</div>`;
              break;
            case "comments":
              inner = `<div class="stack">${items
                .map(commentRow)
                .join("")}</div>`;
              break;
            default:
              inner = "";
          }
          return `<div class="tool-trace">${esc(label)}</div>${inner}`;
        }

        function renderCardsInTrace(wrap, kind, items, label) {
          wrap.classList.remove("loading");
          wrap.innerHTML = buildResultBlock(kind, items, label);
          scrollToBottom();
        }
        function markTraceError(wrap, msg) {
          wrap.classList.remove("loading");
          wrap.classList.add("error");
          wrap.innerHTML = `<div class="tool-trace">${esc(
            wrap.dataset.label || ""
          )}</div><div class="empty-state error">⚠ ${esc(msg)}</div>`;
          scrollToBottom();
        }

        /* ---------- dummyjson execution ---------- */
        async function runTool(name, args) {
          let url, kind;
          switch (name) {
            case "search_products":
              url = `${BASE}/products/search?q=${enc(
                args.query || ""
              )}&limit=8`;
              kind = "products";
              break;
            case "get_products_by_category":
              url = `${BASE}/products/category/${enc(
                args.category || ""
              )}?limit=8`;
              kind = "products";
              break;
            case "search_recipes":
              url = args.query
                ? `${BASE}/recipes/search?q=${enc(args.query)}&limit=8`
                : `${BASE}/recipes?limit=8`;
              kind = "recipes";
              break;
            case "search_users":
              url = args.query
                ? `${BASE}/users/search?q=${enc(args.query)}&limit=8`
                : `${BASE}/users?limit=8`;
              kind = "users";
              break;
            case "search_posts":
              url = args.query
                ? `${BASE}/posts/search?q=${enc(args.query)}&limit=8`
                : `${BASE}/posts?limit=8`;
              kind = "posts";
              break;
            case "get_quotes":
              url = `${BASE}/quotes?limit=${clampLimit(args.limit, 5)}`;
              kind = "quotes";
              break;
            case "get_todos":
              url = `${BASE}/todos?limit=${clampLimit(args.limit, 8)}`;
              kind = "todos";
              break;
            case "get_carts":
              url = `${BASE}/carts?limit=${clampLimit(args.limit, 4)}`;
              kind = "carts";
              break;
            case "get_comments":
              url = `${BASE}/comments?limit=${clampLimit(args.limit, 6)}`;
              kind = "comments";
              break;
            default:
              throw new Error("Unknown tool: " + name);
          }
          const res = await fetch(url);
          if (!res.ok)
            throw new Error(`dummyjson.com request failed (${res.status})`);
          const data = await res.json();
          const items = data[kind] || [];
          return { kind, items };
        }

        function summarizeForModel(kind, items) {
          const slim = items.slice(0, 6).map((it) => {
            switch (kind) {
              case "products":
                return {
                  title: it.title,
                  brand: it.brand,
                  category: it.category,
                  price: it.price,
                  discountPercentage: it.discountPercentage,
                  rating: it.rating,
                  stock: it.stock,
                };
              case "recipes":
                return {
                  name: it.name,
                  cuisine: it.cuisine,
                  difficulty: it.difficulty,
                  prepTimeMinutes: it.prepTimeMinutes,
                  cookTimeMinutes: it.cookTimeMinutes,
                  servings: it.servings,
                  rating: it.rating,
                };
              case "users":
                return {
                  name: `${it.firstName} ${it.lastName}`,
                  username: it.username,
                  email: it.email,
                  company: (it.company && it.company.title) || null,
                  city: (it.address && it.address.city) || null,
                };
              case "posts":
                return {
                  title: it.title,
                  tags: it.tags,
                  likes: (it.reactions && it.reactions.likes) || 0,
                  views: it.views,
                };
              case "quotes":
                return { quote: it.quote, author: it.author };
              case "todos":
                return { todo: it.todo, completed: it.completed };
              case "carts":
                return {
                  id: it.id,
                  totalProducts: it.totalProducts,
                  total: it.total,
                  discountedTotal: it.discountedTotal,
                };
              case "comments":
                return {
                  body: it.body,
                  user: (it.user && it.user.username) || null,
                  likes: it.likes,
                };
              default:
                return it;
            }
          });
          return JSON.stringify({ count: items.length, sample: slim });
        }

        /* ---------- Groq call ---------- */
        async function callGroq() {
          const res = await fetch(GROQ_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${groqApiKey}`,
            },
            body: JSON.stringify({
              model: groqModel,
              messages,
              tools: TOOLS,
              tool_choice: "auto",
              temperature: 0.3,
              max_tokens: 600,
            }),
          });
          if (!res.ok) {
            let detail = "";
            try {
              detail = (await res.json()).error?.message || "";
            } catch (e) {
              /* noop */
            }
            throw new Error(
              `Groq API error ${res.status}${detail ? ": " + detail : ""}`
            );
          }
          const data = await res.json();
          return data.choices[0].message;
        }

        async function handleToolCall(tc) {
          const name = tc.function.name;
          let args = {};
          try {
            args = JSON.parse(tc.function.arguments || "{}");
          } catch (e) {
            /* noop */
          }
          const wrap = appendToolTrace(name, args);
          try {
            const { kind, items } = await runTool(name, args);
            renderCardsInTrace(wrap, kind, items, wrap.dataset.label);
            return {
              role: "tool",
              tool_call_id: tc.id,
              content: summarizeForModel(kind, items),
            };
          } catch (err) {
            markTraceError(wrap, err.message || "Fetch failed");
            return {
              role: "tool",
              tool_call_id: tc.id,
              content: JSON.stringify({ error: err.message || "Fetch failed" }),
            };
          }
        }

        async function sendMessage(text) {
          if (!groqApiKey) {
            appendUserBubble(text);
            appendErrorBubble(
              "Add your Groq API key first — tap ⚙ in the top right."
            );
            settingsPanel.classList.remove("hidden");
            apiKeyInput.focus();
            return;
          }
          appendUserBubble(text);
          messages.push({ role: "user", content: text });

          const thinking = appendThinking();
          setBusy(true);
          try {
            let response = await callGroq();
            let rounds = 0;
            while (
              response.tool_calls &&
              response.tool_calls.length &&
              rounds < 3
            ) {
              rounds++;
              messages.push({
                role: "assistant",
                content: response.content || null,
                tool_calls: response.tool_calls,
              });
              const toolMessages = await Promise.all(
                response.tool_calls.map(handleToolCall)
              );
              toolMessages.forEach((m) => messages.push(m));
              response = await callGroq();
            }
            thinking.remove();
            if (response.content) {
              appendBotBubble(response.content);
              messages.push({ role: "assistant", content: response.content });
            }
          } catch (err) {
            thinking.remove();
            appendErrorBubble(
              err.message || "Something went wrong talking to Groq."
            );
          } finally {
            setBusy(false);
          }
        }

        function setBusy(busy) {
          isBusy = busy;
          sendBtn.disabled = busy;
          msgInput.disabled = busy;
        }

        composer.addEventListener("submit", (e) => {
          e.preventDefault();
          if (isBusy) return;
          const text = msgInput.value.trim();
          if (!text) return;
          msgInput.value = "";
          suggestionsEl.classList.add("hidden");
          sendMessage(text);
        });

        /* ---------- Welcome ---------- */
        appendBotBubble(
          "Hey, I'm FetchBot ⚡ — ask me for products, recipes, users, posts, quotes, todos, carts or comments and I'll call the right function live against dummyjson.com. Add your Groq key (⚙) to start, then try a prompt below."
        );
      })();
    </script>
