<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk City 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #0a0a0a 0%, #1a0a2e 50%, #16213e 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #00ffff;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .control-group {
            margin-bottom: 10px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input[type="range"] {
            width: 150px;
            margin-right: 10px;
            accent-color: #ff00ff;
        }
        
        button {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            color: #000;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            margin: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }
        
        #info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #00ffff;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            border: 1px solid #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00ff00;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            border: 1px solid #00ff00;
            font-family: 'Courier New', monospace;
        }
        
        .glitch {
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0% { text-shadow: 0 0 5px #ff00ff; }
            25% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
            50% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
            75% { text-shadow: 0 0 5px #00ffff; }
            100% { text-shadow: 0 0 5px #ff00ff; }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="controls">
            <div class="control-group">
                <label>Camera Speed</label>
                <input type="range" id="speedSlider" min="0.01" max="0.1" step="0.01" value="0.03">
            </div>
            <div class="control-group">
                <label>Rain Intensity</label>
                <input type="range" id="rainSlider" min="0" max="2000" step="100" value="1000">
            </div>
            <div class="control-group">
                <label>Neon Brightness</label>
                <input type="range" id="neonSlider" min="0.5" max="3" step="0.1" value="1.5">
            </div>
            <div class="control-group">
                <button onclick="toggleRain()">Toggle Rain</button>
                <button onclick="toggleFog()">Toggle Fog</button>
                <button onclick="dayNightCycle()">Day/Night</button>
            </div>
        </div>
        
        <div id="hud">
            <div class="glitch">NEURAL_LINK_ACTIVE</div>
            <div>SECTOR: DOWNTOWN</div>
            <div>WEATHER: ACID_RAIN</div>
            <div>STATUS: ONLINE</div>
        </div>
        
        <div id="info">
            WASD: Move • Mouse: Look • Scroll: Zoom
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, buildings = [], vehicles = [], rainParticles;
        let clock = new THREE.Clock();
        let isRaining = true, hasFog = true, isNight = true;
        let cameraSpeed = 0.03;
        let neonIntensity = 1.5;
        
        // Movement controls
        let keys = {};
        let mouse = { x: 0, y: 0 };
        let cameraRotation = { x: 0, y: 0 };
        
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x16213e, 50, 300);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 50);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0a0a);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);
            
            // Lighting
            createLighting();
            
            // Create city
            createGround();
            createBuildings();
            createVehicles();
            createRain();
            
            // Event listeners
            setupControls();
            
            animate();
        }
        
        function createLighting() {
            // Ambient light
            const ambientLight = new THREE.AmbientLight(0x404040, 0.2);
            scene.add(ambientLight);
            
            // Main directional light (moon/sun)
            const directionalLight = new THREE.DirectionalLight(0x4080ff, 0.3);
            directionalLight.position.set(100, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Neon street lights
            for (let i = 0; i < 20; i++) {
                const light = new THREE.PointLight(
                    Math.random() < 0.5 ? 0xff00ff : 0x00ffff, 
                    2, 
                    30
                );
                light.position.set(
                    (Math.random() - 0.5) * 200,
                    15,
                    (Math.random() - 0.5) * 200
                );
                scene.add(light);
            }
        }
        
        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(400, 400);
            const groundMaterial = new THREE.MeshLambertMaterial({ 
                color: 0x1a1a1a,
                transparent: true,
                opacity: 0.8
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid lines for cyberpunk feel
            const gridGeometry = new THREE.PlaneGeometry(400, 400, 40, 40);
            const gridMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                wireframe: true,
                transparent: true,
                opacity: 0.1
            });
            const grid = new THREE.Mesh(gridGeometry, gridMaterial);
            grid.rotation.x = -Math.PI / 2;
            grid.position.y = 0.1;
            scene.add(grid);
        }
        
        function createBuildings() {
            for (let i = 0; i < 50; i++) {
                const width = Math.random() * 8 + 5;
                const height = Math.random() * 80 + 20;
                const depth = Math.random() * 8 + 5;
                
                const geometry = new THREE.BoxGeometry(width, height, depth);
                
                // Create building material with windows
                const material = new THREE.MeshLambertMaterial({ 
                    color: 0x2a2a2a 
                });
                
                const building = new THREE.Mesh(geometry, material);
                building.position.set(
                    (Math.random() - 0.5) * 180,
                    height / 2,
                    (Math.random() - 0.5) * 180
                );
                building.castShadow = true;
                building.receiveShadow = true;
                
                // Add neon lights to building
                addNeonLights(building, width, height, depth);
                
                buildings.push(building);
                scene.add(building);
            }
        }
        
        function addNeonLights(building, width, height, depth) {
            // Random neon strips on buildings
            for (let i = 0; i < Math.random() * 5 + 2; i++) {
                const neonGeometry = new THREE.BoxGeometry(width * 0.05, height * 0.1, depth * 1.1);
                const neonColor = Math.random() < 0.5 ? 0xff00ff : 0x00ffff;
                const neonMaterial = new THREE.MeshBasicMaterial({ 
                    color: neonColor,
                    transparent: true,
                    opacity: 0.8
                });
                
                const neon = new THREE.Mesh(neonGeometry, neonMaterial);
                neon.position.set(
                    (Math.random() - 0.5) * width * 0.8,
                    (Math.random() - 0.5) * height * 0.8,
                    depth * 0.6
                );
                
                building.add(neon);
                
                // Add glow effect
                const light = new THREE.PointLight(neonColor, 1, 15);
                light.position.copy(neon.position);
                building.add(light);
            }
        }
        
        function createVehicles() {
            for (let i = 0; i < 15; i++) {
                const vehicleGeometry = new THREE.BoxGeometry(4, 1, 2);
                const vehicleMaterial = new THREE.MeshLambertMaterial({ 
                    color: Math.random() * 0xffffff 
                });
                
                const vehicle = new THREE.Mesh(vehicleGeometry, vehicleMaterial);
                vehicle.position.set(
                    (Math.random() - 0.5) * 180,
                    20 + Math.random() * 50,
                    (Math.random() - 0.5) * 180
                );
                
                // Add thrusters
                const thrusterGeometry = new THREE.SphereGeometry(0.5);
                const thrusterMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0x00ff00,
                    transparent: true,
                    opacity: 0.7
                });
                
                const thruster1 = new THREE.Mesh(thrusterGeometry, thrusterMaterial);
                const thruster2 = new THREE.Mesh(thrusterGeometry, thrusterMaterial);
                thruster1.position.set(-1.5, -0.5, -1.2);
                thruster2.position.set(1.5, -0.5, -1.2);
                vehicle.add(thruster1);
                vehicle.add(thruster2);
                
                // Add headlights
                const light = new THREE.PointLight(0xffffff, 2, 20);
                light.position.set(0, 0, 1.5);
                vehicle.add(light);
                
                vehicles.push({
                    mesh: vehicle,
                    speed: Math.random() * 0.5 + 0.2,
                    direction: Math.random() * Math.PI * 2
                });
                
                scene.add(vehicle);
            }
        }
        
        function createRain() {
            const rainGeometry = new THREE.BufferGeometry();
            const rainCount = 1000;
            const positions = [];
            const velocities = [];
            
            for (let i = 0; i < rainCount; i++) {
                positions.push(
                    (Math.random() - 0.5) * 400,
                    Math.random() * 200,
                    (Math.random() - 0.5) * 400
                );
                velocities.push(Math.random() * 2 + 1);
            }
            
            rainGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const rainMaterial = new THREE.PointsMaterial({
                color: 0x00aaff,
                size: 0.5,
                transparent: true,
                opacity: 0.6
            });
            
            rainParticles = new THREE.Points(rainGeometry, rainMaterial);
            rainParticles.userData = { velocities: velocities };
            scene.add(rainParticles);
        }
        
        function setupControls() {
            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                keys[e.code] = true;
            });
            
            document.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });
            
            // Mouse controls
            document.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                
                cameraRotation.y += (mouse.x - cameraRotation.y) * 0.05;
                cameraRotation.x += (mouse.y - cameraRotation.x) * 0.05;
            });
            
            // Wheel zoom
            document.addEventListener('wheel', (e) => {
                camera.fov += e.deltaY * 0.05;
                camera.fov = Math.max(10, Math.min(120, camera.fov));
                camera.updateProjectionMatrix();
            });
            
            // Control sliders
            document.getElementById('speedSlider').addEventListener('input', (e) => {
                cameraSpeed = parseFloat(e.target.value);
            });
            
            document.getElementById('rainSlider').addEventListener('input', (e) => {
                const count = parseInt(e.target.value);
                updateRainCount(count);
            });
            
            document.getElementById('neonSlider').addEventListener('input', (e) => {
                neonIntensity = parseFloat(e.target.value);
                updateNeonIntensity();
            });
        }
        
        function updateCameraMovement() {
            const moveSpeed = cameraSpeed;
            
            if (keys['KeyW']) camera.position.z -= moveSpeed;
            if (keys['KeyS']) camera.position.z += moveSpeed;
            if (keys['KeyA']) camera.position.x -= moveSpeed;
            if (keys['KeyD']) camera.position.x += moveSpeed;
            if (keys['Space']) camera.position.y += moveSpeed;
            if (keys['ShiftLeft']) camera.position.y -= moveSpeed;
            
            // Apply mouse rotation
            camera.rotation.y = cameraRotation.y * 0.1;
            camera.rotation.x = cameraRotation.x * 0.1;
        }
        
        function updateVehicles() {
            vehicles.forEach(vehicle => {
                vehicle.mesh.position.x += Math.cos(vehicle.direction) * vehicle.speed;
                vehicle.mesh.position.z += Math.sin(vehicle.direction) * vehicle.speed;
                
                // Bounce off boundaries
                if (Math.abs(vehicle.mesh.position.x) > 90 || Math.abs(vehicle.mesh.position.z) > 90) {
                    vehicle.direction += Math.PI;
                }
                
                // Add some hover movement
                vehicle.mesh.position.y += Math.sin(Date.now() * 0.001 + vehicle.mesh.position.x * 0.01) * 0.02;
                
                // Rotate vehicle
                vehicle.mesh.rotation.y = vehicle.direction;
            });
        }
        
        function updateRain() {
            if (!isRaining) return;
            
            const positions = rainParticles.geometry.attributes.position.array;
            const velocities = rainParticles.userData.velocities;
            
            for (let i = 0; i < positions.length; i += 3) {
                positions[i + 1] -= velocities[i / 3];
                
                if (positions[i + 1] < 0) {
                    positions[i + 1] = 200;
                }
            }
            
            rainParticles.geometry.attributes.position.needsUpdate = true;
        }
        
        function updateNeonIntensity() {
            buildings.forEach(building => {
                building.children.forEach(child => {
                    if (child.material && child.material.transparent) {
                        child.material.opacity = 0.8 * neonIntensity;
                    }
                });
            });
        }
        
        function updateRainCount(count) {
            scene.remove(rainParticles);
            
            const rainGeometry = new THREE.BufferGeometry();
            const positions = [];
            const velocities = [];
            
            for (let i = 0; i < count; i++) {
                positions.push(
                    (Math.random() - 0.5) * 400,
                    Math.random() * 200,
                    (Math.random() - 0.5) * 400
                );
                velocities.push(Math.random() * 2 + 1);
            }
            
            rainGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const rainMaterial = new THREE.PointsMaterial({
                color: 0x00aaff,
                size: 0.5,
                transparent: true,
                opacity: 0.6
            });
            
            rainParticles = new THREE.Points(rainGeometry, rainMaterial);
            rainParticles.userData = { velocities: velocities };
            scene.add(rainParticles);
        }
        
        function toggleRain() {
            isRaining = !isRaining;
            rainParticles.visible = isRaining;
        }
        
        function toggleFog() {
            hasFog = !hasFog;
            scene.fog = hasFog ? new THREE.Fog(0x16213e, 50, 300) : null;
        }
        
        function dayNightCycle() {
            isNight = !isNight;
            const color = isNight ? 0x16213e : 0x87ceeb;
            const intensity = isNight ? 0.3 : 0.8;
            
            scene.fog = hasFog ? new THREE.Fog(color, 50, 300) : null;
            renderer.setClearColor(isNight ? 0x0a0a0a : 0x87ceeb);
            
            // Update lighting
            scene.children.forEach(child => {
                if (child.isDirectionalLight) {
                    child.intensity = intensity;
                    child.color.setHex(isNight ? 0x4080ff : 0xffffff);
                }
            });
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            updateCameraMovement();
            updateVehicles();
            updateRain();
            
            // Animate neon lights
            const time = Date.now() * 0.001;
            buildings.forEach(building => {
                building.children.forEach(child => {
                    if (child.material && child.material.transparent) {
                        child.material.opacity = (Math.sin(time * 2 + child.position.x) + 1) * 0.4 + 0.4;
                    }
                });
            });
            
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Start the experience
        init();
    </script>
</body>
</html>
